name: Build & Release

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # build.bat pre-creates obj/ to avoid a WPF XAML pack URI bug
      - name: Pre-create obj directory
        run: New-Item -ItemType Directory -Force -Path obj | Out-Null

      - name: Restore packages
        run: dotnet restore SilentInstall.csproj

      - name: Build plugin (Release)
        run: dotnet build SilentInstall.csproj -c Release --no-restore

      - name: Restore installer packages
        run: dotnet restore Setup/SilentInstallSetup.csproj

      - name: Build installer (Release)
        run: dotnet build Setup/SilentInstallSetup.csproj -c Release --no-restore

      - name: Package dist
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "bin\Release\net462\SilentInstall.dll"     dist\
          Copy-Item "extension.yaml"                            dist\
          Copy-Item "Setup\bin\Release\net462\Install.exe"     dist\

      - name: Read version from extension.yaml
        id: version
        run: |
          $line = Get-Content extension.yaml | Where-Object { $_ -match '^Version:' }
          $ver  = $line -replace '^Version:\s*', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      # == Pre-release (dev branch) ==========================================
      - name: Zip dist (beta)
        if: github.ref == 'refs/heads/dev'
        run: |
          Compress-Archive -Path dist\* `
            -DestinationPath "SilentInstall-v${{ steps.version.outputs.VERSION }}-beta.zip" `
            -Force

      - name: Publish pre-release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}-beta
          name: "Silent Install v${{ steps.version.outputs.VERSION }} — Beta"
          prerelease: true
          body: |
            > ⚠️ **Pre-release** — build automatique depuis `dev`. Non destiné à la production.

            ## What's new in v${{ steps.version.outputs.VERSION }}

            ### v1.2.0
            - 🚀 `Install.exe` — installateur intégré au zip, détecte automatiquement le dossier Playnite, gère install et upgrade

            ### v1.1.0
            - ⬇ Notification au démarrage du téléchargement avec statut "en cours"
            - ✅ Notification de fin d'installation avec suppression automatique du banner "en cours"
            - ⚠ Notification d'avertissement si l'appmanifest est illisible pendant plus d'1 minute
            - ⚠ Notification de timeout après 24h de monitoring sans résultat
            - 🤖 CI/CD automatisée — les releases sont publiées automatiquement à chaque push

            ---

            ## Installation
            1. Télécharge `SilentInstall-v${{ steps.version.outputs.VERSION }}-beta.zip`
            2. Extrais le zip n'importe où
            3. Lance **`Install.exe`** — il s'occupe du reste ✅

            > Installation manuelle : copie `SilentInstall.dll` et `extension.yaml` dans `%APPDATA%\Playnite\Extensions\SilentInstall\`
          files: SilentInstall-v${{ steps.version.outputs.VERSION }}-beta.zip

      # == Release officielle (main branch) ==================================
      - name: Zip dist (stable)
        if: github.ref == 'refs/heads/main'
        run: |
          Compress-Archive -Path dist\* `
            -DestinationPath "SilentInstall-v${{ steps.version.outputs.VERSION }}.zip" `
            -Force

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Silent Install v${{ steps.version.outputs.VERSION }}
          prerelease: false
          make_latest: true
          body: |
            ## What's new in v${{ steps.version.outputs.VERSION }}

            ### v1.2.0
            - 🚀 `Install.exe` — installateur intégré au zip, détecte automatiquement le dossier Playnite, gère install et upgrade

            ### v1.1.0
            - ⬇ Notification au démarrage du téléchargement avec statut "en cours"
            - ✅ Notification de fin d'installation avec suppression automatique du banner "en cours"
            - ⚠ Notification d'avertissement si l'appmanifest est illisible pendant plus d'1 minute
            - ⚠ Notification de timeout après 24h de monitoring sans résultat
            - 🤖 CI/CD automatisée — les releases sont publiées automatiquement à chaque push

            ---

            ## Installation
            1. Télécharge `SilentInstall-v${{ steps.version.outputs.VERSION }}.zip`
            2. Extrais le zip n'importe où
            3. Lance **`Install.exe`** — il s'occupe du reste ✅

            > Installation manuelle : copie `SilentInstall.dll` et `extension.yaml` dans `%APPDATA%\Playnite\Extensions\SilentInstall\`
          files: SilentInstall-v${{ steps.version.outputs.VERSION }}.zip
