name: Build & Release

on:
  push:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # build.bat pre-creates obj/ to avoid a WPF XAML pack URI bug
      - name: Pre-create obj directory
        run: New-Item -ItemType Directory -Force -Path obj | Out-Null

      - name: Restore packages
        run: dotnet restore SilentInstall.csproj

      - name: Build plugin (Release)
        run: dotnet build SilentInstall.csproj -c Release --no-restore

      - name: Restore installer packages
        run: dotnet restore Setup/SilentInstallSetup.csproj

      - name: Build installer (Release)
        run: dotnet build Setup/SilentInstallSetup.csproj -c Release --no-restore

      - name: Read version from extension.yaml
        id: version
        run: |
          $line = Get-Content extension.yaml | Where-Object { $_ -match '^Version:' }
          $ver  = $line -replace '^Version:\s*', ''
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT


      - name: Package dist
        run: |
          New-Item -ItemType Directory -Force -Path dist          | Out-Null
          New-Item -ItemType Directory -Force -Path dist\payload  | Out-Null
          # Plugin files go into payload/ — read by the installer, invisible to the user
          Copy-Item "bin\Release\net462\SilentInstall.dll"  dist\payload\
          Copy-Item "extension.yaml"                            dist\payload\
          # Installer at root, named with version for clarity
          Copy-Item "Setup\bin\Release\net462\Install.exe" "dist\SilentInstall-Setup-v${{ steps.version.outputs.VERSION }}.exe"

      - name: Build .pext package (Playnite addon format)
        run: |
          # .pext = zip containing DLL + extension.yaml at root (no subdirs)
          New-Item -ItemType Directory -Force -Path pext_staging | Out-Null
          Copy-Item "bin\Release\net462\SilentInstall.dll" pext_staging\
          Copy-Item "extension.yaml"                           pext_staging\
          Compress-Archive -Path pext_staging\* `
            -DestinationPath "SilentInstall_v${{ steps.version.outputs.VERSION }}.pext" `
            -Force

      # == Pre-release (dev branch) ==========================================
      - name: Zip dist (beta)
        if: github.ref == 'refs/heads/dev'
        run: |
          Compress-Archive -Path dist\* `
            -DestinationPath "SilentInstall-v${{ steps.version.outputs.VERSION }}-beta.zip" `
            -Force

      - name: Publish pre-release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}-beta
          name: "Silent Install v${{ steps.version.outputs.VERSION }} — Beta"
          prerelease: true
          body: |
            > ⚠️ **Pre-release** — automated build from `dev`. Not intended for production use.

            ## What's new in v${{ steps.version.outputs.VERSION }}

            ### v1.2.5
            - 🌐 Fixed install directory corruption for non-English games (e.g. Hogwarts Legacy showing Cyrillic) — Steam API now forced to English (`cc=us&l=english`)
            - 🔧 Fixed UTF-8 encoding on Steam API response

            ### v1.2.5
            - ⚡ Steam no longer restarts if not needed — plugin now tries to trigger the download silently via `steam://open/downloads` first; only restarts Steam if no activity is detected after 20 seconds

            ### v1.2.4
            - 📂 Library picker at install time — choose which Steam library to install to when multiple are available
            - 📊 Real download progress — notification updates with percentage and GB downloaded/total
            - 📋 Dedicated log file — `SilentInstall.log` in the plugin data directory (rotates at 1 MB)

            ### v1.2.5
            - 🌐 Fixed install directory corruption for non-English games (e.g. Hogwarts Legacy showing Cyrillic) — Steam API now forced to English (`cc=us&l=english`)
            - 🔧 Fixed UTF-8 encoding on Steam API response

            ### v1.2.5
            - ⚡ Steam no longer restarts if not needed — plugin now tries to trigger the download silently via `steam://open/downloads` first; only restarts Steam if no activity is detected after 20 seconds

            ### v1.2.4
            - 📊 Real download progress using `steamapps/downloading/<appid>/` folder size vs `BytesToDownload` — updates live every 5 seconds instead of being stuck at 0%

            ### v1.2.3
            - 🧹 ACF deleted after successful install — Steam won't auto-reinstall if the game is uninstalled later
            - 🗑 Uninstall action now uses Playnite's stored install directory (ACF is removed post-install)
            - 🔢 Fixed missing version number in installer filename (`SilentInstall-Setup-vX.X.X.exe`)

            ### v1.2.2
            - 🗂 Installer renamed to `SilentInstall-Setup-vX.X.X.exe` for clarity
            - 📦 Plugin files moved to `payload/` subfolder — cleaner zip structure

            ### v1.2.1
            - 🛡 Added application manifest and assembly metadata to reduce Windows Defender / SmartScreen false positives
            - 📝 Changelogs are now written in English

            ### v1.2.0
            - 🚀 `Install.exe` — bundled installer, auto-detects the Playnite Extensions folder, handles both fresh installs and upgrades

            ### v1.1.0
            - ⬇ Notification when a download is queued in Steam
            - ✅ Notification when installation is complete (removes the in-progress banner)
            - ⚠ Warning notification if the appmanifest is unreadable for more than 1 minute
            - ⚠ Timeout notification after 24 h of monitoring with no result
            - 🤖 CI/CD pipeline — releases are published automatically on every push

            ---

            ## Installation
            1. Download `SilentInstall-v${{ steps.version.outputs.VERSION }}-beta.zip`
            2. Extract the zip anywhere
            3. Run **`SilentInstall-Setup-v${{ steps.version.outputs.VERSION }}.exe`** — it handles everything ✅

            > **Windows SmartScreen warning?** This is expected for any unsigned executable downloaded from the internet.
            > Click **More info → Run anyway** to proceed. No code signing certificate is currently used.

            > Manual install: copy `SilentInstall.dll` and `extension.yaml` to `%APPDATA%\Playnite\Extensions\SilentInstall\`
          files: |
            SilentInstall-v${{ steps.version.outputs.VERSION }}-beta.zip
            SilentInstall_v${{ steps.version.outputs.VERSION }}.pext

      # == Release officielle (main branch) ==================================
      - name: Zip dist (stable)
        if: github.ref == 'refs/heads/main'
        run: |
          Compress-Archive -Path dist\* `
            -DestinationPath "SilentInstall-v${{ steps.version.outputs.VERSION }}.zip" `
            -Force

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "Silent Install v${{ steps.version.outputs.VERSION }} - stable"
          prerelease: false
          make_latest: true
          body: |
            ## What's new in v${{ steps.version.outputs.VERSION }}

            ### v1.2.5
            - 🌐 Fixed install directory corruption for non-English games (e.g. Hogwarts Legacy showing Cyrillic) — Steam API now forced to English (`cc=us&l=english`)
            - 🔧 Fixed UTF-8 encoding on Steam API response

            ### v1.2.5
            - ⚡ Steam no longer restarts if not needed — plugin now tries to trigger the download silently via `steam://open/downloads` first; only restarts Steam if no activity is detected after 20 seconds

            ### v1.2.4
            - 📂 Library picker at install time — choose which Steam library to install to when multiple are available
            - 📊 Real download progress — notification updates with percentage and GB downloaded/total
            - 📋 Dedicated log file — `SilentInstall.log` in the plugin data directory (rotates at 1 MB)

            ### v1.2.5
            - 🌐 Fixed install directory corruption for non-English games (e.g. Hogwarts Legacy showing Cyrillic) — Steam API now forced to English (`cc=us&l=english`)
            - 🔧 Fixed UTF-8 encoding on Steam API response

            ### v1.2.5
            - ⚡ Steam no longer restarts if not needed — plugin now tries to trigger the download silently via `steam://open/downloads` first; only restarts Steam if no activity is detected after 20 seconds

            ### v1.2.4
            - 📊 Real download progress using `steamapps/downloading/<appid>/` folder size vs `BytesToDownload` — updates live every 5 seconds instead of being stuck at 0%

            ### v1.2.3
            - 🧹 ACF deleted after successful install — Steam won't auto-reinstall if the game is uninstalled later
            - 🗑 Uninstall action now uses Playnite's stored install directory (ACF is removed post-install)
            - 🔢 Fixed missing version number in installer filename (`SilentInstall-Setup-vX.X.X.exe`)

            ### v1.2.2
            - 🗂 Installer renamed to `SilentInstall-Setup-vX.X.X.exe` for clarity
            - 📦 Plugin files moved to `payload/` subfolder — cleaner zip structure

            ### v1.2.1
            - 🛡 Added application manifest and assembly metadata to reduce Windows Defender / SmartScreen false positives
            - 📝 Changelogs are now written in English

            ### v1.2.0
            - 🚀 `Install.exe` — bundled installer, auto-detects the Playnite Extensions folder, handles both fresh installs and upgrades

            ### v1.1.0
            - ⬇ Notification when a download is queued in Steam
            - ✅ Notification when installation is complete (removes the in-progress banner)
            - ⚠ Warning notification if the appmanifest is unreadable for more than 1 minute
            - ⚠ Timeout notification after 24 h of monitoring with no result
            - 🤖 CI/CD pipeline — releases are published automatically on every push

            ---

            ## Installation
            1. Download `SilentInstall-v${{ steps.version.outputs.VERSION }}.zip`
            2. Extract the zip anywhere
            3. Run **`SilentInstall-Setup-v${{ steps.version.outputs.VERSION }}.exe`** — it handles everything ✅

            > **Windows SmartScreen warning?** This is expected for any unsigned executable downloaded from the internet.
            > Click **More info → Run anyway** to proceed. No code signing certificate is currently used.

            > Manual install: copy `SilentInstall.dll` and `extension.yaml` to `%APPDATA%\Playnite\Extensions\SilentInstall\`
          files: |
            SilentInstall-v${{ steps.version.outputs.VERSION }}.zip
            SilentInstall_v${{ steps.version.outputs.VERSION }}.pext

      # == Update installer_manifest.yaml in repo (main branch only) ==============
      - name: Update installer_manifest.yaml
        if: github.ref == 'refs/heads/main'
        run: |
          $ver     = "${{ steps.version.outputs.VERSION }}"
          $date    = (Get-Date).ToString("yyyy-MM-dd")
          $pextUrl = "https://github.com/gabrielchamak/Playnite-Steam-install/releases/download/v$ver/SilentInstall_v$ver.pext"
          $yaml    = Get-Content installer_manifest.yaml -Raw

          if ($yaml -notmatch "Version: $ver") {
            $line1 = "  - Version: $ver"
            $line2 = "    RequiredApiVersion: 6.10.0"
            $line3 = "    ReleaseDate: $date"
            $line4 = "    PackageUrl: $pextUrl"
            $line5 = "    Changelog:"
            $line6 = "      - See GitHub release notes"
            $entry = "$line1`n$line2`n$line3`n$line4`n$line5`n$line6`n"
            $yaml  = $yaml -replace "(?m)^(Packages:)", "Packages:`n$entry"
            Set-Content installer_manifest.yaml $yaml -NoNewline
          }

      - name: Commit installer_manifest.yaml
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add installer_manifest.yaml
          git diff --staged --quiet || git commit -m "ci: update installer_manifest.yaml for v${{ steps.version.outputs.VERSION }}"
          git push
